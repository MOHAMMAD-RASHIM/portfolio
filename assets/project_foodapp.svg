<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg_food" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#14100a"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <filter id="glow_food">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg_food)"/>

  <!-- Map background grid (city streets) -->
  <g opacity="0.08" stroke="#d4af37" stroke-width="1">
    <line x1="0" y1="150" x2="1600" y2="150"/><line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/><line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/><line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/><line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>

  <!-- Map city blocks (background) -->
  <g fill="#12100d" stroke="#d4af3710" stroke-width="1">
    <rect x="220" y="170" width="160" height="110" rx="3"/>
    <rect x="420" y="170" width="120" height="110" rx="3"/>
    <rect x="580" y="170" width="190" height="80" rx="3"/>
    <rect x="220" y="320" width="100" height="100" rx="3"/>
    <rect x="360" y="320" width="180" height="100" rx="3"/>
    <rect x="580" y="300" width="140" height="120" rx="3"/>
    <rect x="220" y="465" width="200" height="100" rx="3"/>
    <rect x="460" y="465" width="100" height="100" rx="3"/>
    <rect x="600" y="475" width="160" height="80" rx="3"/>
  </g>

  <!-- Delivery route path glowing -->
  <path d="M350 550 Q400 400 500 350 Q600 300 700 320 Q800 340 850 400 Q900 460 950 430" 
        fill="none" stroke="#d4af37" stroke-width="3" opacity="0.9" stroke-dasharray="12,6" filter="url(#glow_food)"/>

  <!-- Location markers on map -->
  <!-- Restaurant marker -->
  <circle cx="350" cy="555" r="16" fill="#d4af37" opacity="0.9" filter="url(#glow_food)"/>
  <text x="350" y="560" font-family="monospace" font-size="13" fill="#0b0b0d" text-anchor="middle" font-weight="bold">R</text>
  <!-- Delivery rider -->
  <circle cx="660" cy="315" r="12" fill="#e67e22" opacity="0.9" filter="url(#glow_food)"/>
  <text x="660" y="320" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">🛵</text>
  <!-- Customer marker -->
  <circle cx="952" cy="430" r="16" fill="#22c55e" opacity="0.9" filter="url(#glow_food)"/>
  <text x="952" y="435" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle">📍</text>

  <!-- Pulse rings around delivery bike -->
  <circle cx="660" cy="315" r="25" fill="none" stroke="#e67e22" stroke-width="1.5" opacity="0.4"/>
  <circle cx="660" cy="315" r="40" fill="none" stroke="#e67e22" stroke-width="1" opacity="0.2"/>

  <!-- Right panel - Order Tracking -->
  <rect x="1050" y="60" width="490" height="780" rx="8" fill="#121216" stroke="#d4af3725" stroke-width="1"/>
  <rect x="1050" y="60" width="490" height="5" rx="2" fill="#d4af37" opacity="0.7"/>

  <!-- App header -->
  <circle cx="1080" cy="100" r="14" fill="#d4af37" opacity="0.8"/>
  <text x="1110" y="106" font-family="monospace" font-size="14" fill="#f5f5f7" font-weight="bold">FoodApp</text>
  <text x="1490" y="106" font-family="monospace" font-size="11" fill="#d4af37" text-anchor="end">●●●</text>

  <!-- Search bar -->
  <rect x="1070" y="120" width="450" height="38" rx="6" fill="#1a1a22" stroke="#d4af3720" stroke-width="1"/>
  <text x="1090" y="144" font-family="monospace" font-size="11" fill="#62646c">🔍  Search restaurants, cuisines...</text>

  <!-- Category chips -->
  <g font-family="monospace" font-size="10">
    <rect x="1070" y="172" width="70" height="26" rx="13" fill="#d4af37" opacity="0.9"/>
    <text x="1105" y="189" fill="#0b0b0d" text-anchor="middle" font-weight="bold">🍕 Pizza</text>
    <rect x="1148" y="172" width="75" height="26" rx="13" fill="#1a1a22" stroke="#d4af3725" stroke-width="1"/>
    <text x="1185" y="189" fill="#9ea0a8" text-anchor="middle">🍣 Sushi</text>
    <rect x="1231" y="172" width="80" height="26" rx="13" fill="#1a1a22" stroke="#d4af3725" stroke-width="1"/>
    <text x="1271" y="189" fill="#9ea0a8" text-anchor="middle">🍔 Burger</text>
    <rect x="1319" y="172" width="75" height="26" rx="13" fill="#1a1a22" stroke="#d4af3725" stroke-width="1"/>
    <text x="1356" y="189" fill="#9ea0a8" text-anchor="middle">🍜 Noodles</text>
  </g>

  <!-- Order Status Card -->
  <rect x="1070" y="215" width="450" height="130" rx="8" fill="#1a1520" stroke="#d4af3730" stroke-width="1"/>
  <text x="1090" y="242" font-family="monospace" font-size="11" fill="#d4af37" letter-spacing="2">CURRENT ORDER</text>
  <text x="1090" y="265" font-family="monospace" font-size="13" fill="#f5f5f7">Margherita Pizza · Garlic Bread</text>
  <text x="1090" y="285" font-family="monospace" font-size="10" fill="#9ea0a8">Spice Garden · Est. 18 min remaining</text>
  <!-- Progress steps -->
  <g fill="#d4af37">
    <circle cx="1100" cy="320" r="7"/>
    <circle cx="1180" cy="320" r="7"/>
    <circle cx="1260" cy="320" r="7"/>
    <circle cx="1340" cy="320" r="7" fill="#1a1a22" stroke="#62646c" stroke-width="1.5"/>
    <circle cx="1420" cy="320" r="7" fill="#1a1a22" stroke="#62646c" stroke-width="1.5"/>
  </g>
  <line x1="1107" y1="320" x2="1173" y2="320" stroke="#d4af37" stroke-width="2"/>
  <line x1="1187" y1="320" x2="1253" y2="320" stroke="#d4af37" stroke-width="2"/>
  <line x1="1267" y1="320" x2="1333" y2="320" stroke="#62646c" stroke-width="1"/>
  <line x1="1347" y1="320" x2="1413" y2="320" stroke="#62646c" stroke-width="1"/>
  <g font-family="monospace" font-size="9" fill="#62646c">
    <text x="1100" y="338" text-anchor="middle">Placed</text>
    <text x="1180" y="338" text-anchor="middle">Confirmed</text>
    <text x="1260" y="338" text-anchor="middle">Preparing</text>
    <text x="1340" y="338" text-anchor="middle">On Way</text>
    <text x="1420" y="338" text-anchor="middle">Delivered</text>
  </g>

  <!-- Restaurant cards -->
  <rect x="1070" y="365" width="215" height="145" rx="6" fill="#121216" stroke="#d4af3718" stroke-width="1"/>
  <rect x="1070" y="365" width="215" height="70" rx="6" fill="#1a1520"/>
  <text x="1085" y="456" font-family="monospace" font-size="11" fill="#f5f5f7">Spice Garden</text>
  <text x="1085" y="474" font-family="monospace" font-size="10" fill="#d4af37">⭐ 4.8</text>
  <text x="1180" y="474" font-family="monospace" font-size="10" fill="#62646c">20-30 min</text>
  <text x="1085" y="494" font-family="monospace" font-size="10" fill="#62646c">Indian · $1.99 delivery</text>

  <rect x="1305" y="365" width="215" height="145" rx="6" fill="#121216" stroke="#d4af3718" stroke-width="1"/>
  <rect x="1305" y="365" width="215" height="70" rx="6" fill="#1a1520"/>
  <text x="1320" y="456" font-family="monospace" font-size="11" fill="#f5f5f7">Pizza Hub</text>
  <text x="1320" y="474" font-family="monospace" font-size="10" fill="#d4af37">⭐ 4.6</text>
  <text x="1415" y="474" font-family="monospace" font-size="10" fill="#62646c">15-25 min</text>
  <text x="1320" y="494" font-family="monospace" font-size="10" fill="#62646c">Italian · Free delivery</text>

  <!-- More restaurant cards -->
  <rect x="1070" y="525" width="215" height="120" rx="6" fill="#121216" stroke="#d4af3718" stroke-width="1"/>
  <rect x="1305" y="525" width="215" height="120" rx="6" fill="#121216" stroke="#d4af3718" stroke-width="1"/>
  <rect x="1070" y="660" width="450" height="100" rx="6" fill="#1a1520" stroke="#d4af3718" stroke-width="1"/>

  <!-- Cart button -->
  <rect x="1070" y="775" width="450" height="50" rx="8" fill="#d4af37"/>
  <text x="1295" y="806" font-family="monospace" font-size="14" fill="#0b0b0d" text-anchor="middle" font-weight="bold">View Cart · $34.97</text>

  <!-- Title -->
  <text x="525" y="840" font-family="'Outfit', sans-serif" font-size="26" fill="#d4af37" text-anchor="middle" font-weight="300" letter-spacing="5" opacity="0.85" filter="url(#glow_food)">FOODAPP · FULL STACK FOOD DELIVERY PLATFORM</text>
</svg>
