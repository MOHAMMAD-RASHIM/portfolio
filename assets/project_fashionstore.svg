  <!-- Title -->
  <text x="800" y="840" font-family="'Outfit', sans-serif" font-size="26" fill="#d4af37" text-anchor="middle" font-weight="300" letter-spacing="5" opacity="0.85" filter="url(#glow_fs)">FASHIONSTORE · PREMIUM E-COMMERCE PLATFORM</text>
