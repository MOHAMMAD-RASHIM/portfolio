    <line x1="0" y1="540" x2="1600" y2="540"/><line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="160" y1="0" x2="160" y2="900"/><line x1="320" y1="0" x2="320" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="900"/><line x1="640" y1="0" x2="640" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/><line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1120" y1="0" x2="1120" y2="900"/><line x1="1280" y1="0" x2="1280" y2="900"/>
