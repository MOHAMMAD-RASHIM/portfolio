      <stop offset="0%" stop-color="#16121a"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <filter id="glow_fs">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg_fs)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#d4af37" stroke-width="0.5">
